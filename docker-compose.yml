# ──────────────────────────────────────────────────────────────
# SignalVault — local infrastructure
#
#   docker compose up -d --build        # build + start postgres + api
#   docker compose logs -f signalvault-api
#   docker compose down -v              # stop + wipe volumes
#
# The web client (signal-vault-web) runs separately with `pnpm dev`
# on http://localhost:3000 and talks to the API on :8080.
# ──────────────────────────────────────────────────────────────

services:
  postgres:
    image: postgres:16-alpine
    container_name: signalvault-postgres
    environment:
      POSTGRES_DB: signalvault
      POSTGRES_USER: signalvault
      POSTGRES_PASSWORD: signalvault
    ports:
      - "5432:5432"
    volumes:
      - signalvault-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U signalvault -d signalvault"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  signalvault-api:
    build:
      context: ./signal-vault-backend
      dockerfile: Dockerfile
    container_name: signalvault-api
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SERVER_PORT: 8080
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/signalvault
      SPRING_DATASOURCE_USERNAME: signalvault
      SPRING_DATASOURCE_PASSWORD: signalvault
      # Dev-only secret. Override in any real deployment.
      APP_JWT_SECRET: "dev-only-change-me-please-use-a-long-random-256-bit-secret-value"
      APP_JWT_ACCESS_TTL: "900"        # seconds (15 min)
      APP_JWT_REFRESH_TTL: "604800"    # seconds (7 days)
      APP_CORS_ALLOWED_ORIGINS: "http://localhost:3000,http://127.0.0.1:3000,https://*.ngrok-free.app"
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
    restart: unless-stopped

  # Optional DB UI — `docker compose --profile tools up adminer`
  adminer:
    image: adminer:latest
    container_name: signalvault-adminer
    profiles: ["tools"]
    depends_on:
      - postgres
    ports:
      - "8081:8080"
    restart: unless-stopped

volumes:
  signalvault-pgdata:
