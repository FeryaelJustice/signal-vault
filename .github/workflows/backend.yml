name: backend

on:
  push:
    branches: [main]
    paths:
      - "signal-vault-backend/**"
      - ".github/workflows/backend.yml"
  pull_request:
    paths:
      - "signal-vault-backend/**"
      - ".github/workflows/backend.yml"

defaults:
  run:
    working-directory: signal-vault-backend

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build & test (Testcontainers uses the runner's Docker)
        run: ./gradlew --no-daemon clean build

      - name: Publish test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-report
          path: signal-vault-backend/build/reports/tests/

  docker-image:
    runs-on: ubuntu-latest
    needs: build-test
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -t signalvault-api:ci ./signal-vault-backend
