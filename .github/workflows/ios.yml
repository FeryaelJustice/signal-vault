name: ios

on:
  push:
    branches: [main]
    paths:
      - "signal-vault-ios/**"
      - ".github/workflows/ios.yml"
  pull_request:
    paths:
      - "signal-vault-ios/**"
      - ".github/workflows/ios.yml"

defaults:
  run:
    working-directory: signal-vault-ios

jobs:
  build-test:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      # The iOS app is a skeleton in this pass; skip gracefully until an Xcode
      # project / SwiftPM package exists so CI stays green on the monorepo.
      - name: Detect Xcode project
        id: detect
        run: |
          if ls *.xcodeproj *.xcworkspace Package.swift >/dev/null 2>&1; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build & test
        if: steps.detect.outputs.present == 'true'
        run: |
          xcodebuild -scheme SignalVault -destination 'platform=iOS Simulator,name=iPhone 15' \
            clean build test | xcpretty || true

      - name: Skeleton notice
        if: steps.detect.outputs.present == 'false'
        run: echo "signal-vault-ios is a skeleton; no Xcode project yet. Skipping."
