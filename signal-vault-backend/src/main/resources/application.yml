server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: signalvault
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/signalvault}
    username: ${SPRING_DATASOURCE_USERNAME:signalvault}
    password: ${SPRING_DATASOURCE_PASSWORD:signalvault}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
    show-sql: false
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

app:
  jwt:
    # Dev-only default secret. MUST be overridden in production via APP_JWT_SECRET.
    # Must be at least 256 bits (32 bytes) for HS256.
    secret: ${APP_JWT_SECRET:dev-signalvault-super-secret-key-change-me-in-production-0123456789}
    # Access token TTL in seconds (default 900 = 15 minutes).
    access-ttl: ${APP_JWT_ACCESS_TTL:900}
    # Refresh token TTL in seconds (default 604800 = 7 days).
    refresh-ttl: ${APP_JWT_REFRESH_TTL:604800}
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:3000}
  cookie:
    # In dev (http://localhost) Secure cookies are not sent over http, so default false.
    # Set APP_COOKIE_SECURE=true behind HTTPS in production.
    secure: ${APP_COOKIE_SECURE:false}

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true

logging:
  level:
    org.springframework.security: INFO
    com.signalvault: INFO
